name: CI

env:
  TRIGGER_TEXT: ${{ github.event.head_commit.message || github.event.pull_request.title }}

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make build

      - name: Clean
        if: always()
        run: make clean

  test:
    if: contains(${{ env.TRIGGER_TEXT }}, '[test]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        run: |
          make build
          make test

      - name: Clean
        if: always()
        run: make clean
