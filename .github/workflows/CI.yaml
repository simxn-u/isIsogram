name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make build

  test:
    if: contains(github.event.head_commit.message, '[test]') || contains(github.event.pull_request.title, '[test]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        run: |
          make build
          make test

  clean:
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Clean
        run: make clean
